# =========================================================
#  Crit 2048 — GitHub Actions: Free Multi-Platform Build
#
#  Triggers automatically when you push a version tag:
#    git tag v1.0.0 && git push --tags
#
#  Produces (uploaded as Release Assets — all FREE):
#    - Windows:  .exe installer + .msi
#    - macOS:    .dmg
#    - Linux:    .AppImage + .deb
#    - Android:  .apk (debug)
# =========================================================

name: "Build & Release All Platforms"

on:
  push:
    tags:
      - "v*"           # triggers on v1.0.0, v2.0.0-beta, etc.
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  # ─────────────────────────────────────────────────────────
  # DESKTOP BUILDS  (Windows + macOS + Linux)
  # ─────────────────────────────────────────────────────────
  build-desktop:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"       # Apple Silicon
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"        # Intel Mac
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux: install WebKitGTK (required for Tauri on Linux)
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # Download vendor assets (Three.js + Tailwind)
      - name: Download vendor assets (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vendor | Out-Null
          Invoke-WebRequest "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" -OutFile "vendor/three.min.js"
          Invoke-WebRequest "https://cdn.tailwindcss.com" -OutFile "vendor/tailwind.min.js"

      - name: Download vendor assets (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p vendor
          curl -L "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" -o "vendor/three.min.js"
          curl -L "https://cdn.tailwindcss.com" -o "vendor/tailwind.min.js"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Crit 2048 ${{ github.ref_name }}"
          releaseBody: |
            ## ⚔️ Crit 2048 — ${{ github.ref_name }}

            A roguelike dungeon crawler built on 2048, inspired by Balatro and D&D 5e.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🪟 Windows | `.exe` installer or `.msi` |
            | 🍎 macOS (Apple Silicon) | `aarch64.dmg` |
            | 🍎 macOS (Intel) | `x64.dmg` |
            | 🐧 Linux | `.AppImage` or `.deb` |
            | 🤖 Android | `.apk` (debug — see Android job) |

            > **macOS users:** Right-click → Open if Gatekeeper blocks the app (unsigned build).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────────
  # ANDROID BUILD  (Debug APK — free, no signing needed)
  # ─────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.11902837"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.11902837" >> $GITHUB_ENV

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Download vendor assets
        run: |
          mkdir -p vendor
          curl -L "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" -o "vendor/three.min.js"
          curl -L "https://cdn.tailwindcss.com" -o "vendor/tailwind.min.js"

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Initialize Tauri Android project
        run: cargo tauri android init

      - name: Build Android APK (debug)
        run: cargo tauri android build --apk --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Find and rename APK
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" "crit2048-android-debug.apk"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: crit2048-android-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
