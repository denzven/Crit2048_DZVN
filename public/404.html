<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Dungeon — 404</title>
    <style>
        body {
            background-color: #020617;
            color: #f43f5e;
            font-family: 'Cinzel', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .icon { font-size: 5rem; margin-bottom: 1rem; animation: float 3s infinite ease-in-out; }
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; letter-spacing: 0.2em; }
        p { color: #94a3b8; font-family: sans-serif; margin: 1rem 0 2rem 0; }
        .btn {
            background: #f43f5e;
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            border: 2px solid #fb7185;
        }
        .btn:hover { background: #e11d48; transform: scale(1.05); box-shadow: 0 0 20px rgba(244, 63, 94, 0.5); }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <script>
        // Auto-redirect after 5 seconds
        setTimeout(() => {
            window.location.href = "/Crit2048-DZVN/";
        }, 5000);
    </script>
</head>
<body>
    <div class="icon">💀</div>
    <h1>404: Lost in the Void</h1>
    <p>You have wandered too deep into the uncharted corridors. The darkness consumes this path.</p>
    <a href="/Crit2048-DZVN/" class="btn">Return to Camp</a>
    <p style="font-size: 0.7rem; opacity: 0.5; margin-top: 2rem;">Teleporting back in 5 seconds...</p>
</body>
</html>
