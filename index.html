<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Crit 2048: Roguelike D&D</title>

  <!-- Styling: Tailwind static CSS (generated offline by Tailwind CLI — no CDN) -->
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/main.css">

  <!-- Three.js for 3D Dice Simulation (vendored locally — no CDN) -->
  <script src="vendor/three.min.js"></script>
  <!-- html2canvas for Run Summaries (vendored locally — no CDN) -->
  <script src="vendor/html2canvas.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-rose-500 flex flex-col h-screen w-screen overflow-hidden">
  
  <!-- PRELOADER -->
  <div id="preloader" class="fixed inset-0 bg-slate-950 z-[200] flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="relative w-16 h-16">
      <div class="w-full h-full border-2 border-rose-500/10 border-t-rose-500 rounded-full animate-spin shadow-[0_0_15px_rgba(244,63,94,0.3)]"></div>
    </div>
  </div>

  <header class="bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0 relative z-40 px-4">
    <div class="flex items-center gap-2">
      <h1 onclick="confirmHome()" class="text-lg md:text-2xl font-black tracking-wider text-rose-500 flex items-center gap-2 font-serif cursor-pointer hover:text-rose-400 transition-colors" title="Home">
        🐉 CRIT 2048
      </h1>
      <span id="header-ante" class="hide bg-slate-800 text-slate-300 text-xs font-bold px-2 py-1 rounded-md ml-2 uppercase tracking-widest">Ante 1</span>
    </div>
    <div class="flex items-center gap-3 md:gap-4">
      <div id="header-stats" class="hide flex gap-2 md:gap-4 text-sm md:text-base font-black text-amber-400">
        <span class="flex items-center gap-1.5 bg-slate-900/50 px-2.5 py-1.5 rounded-xl border border-slate-800 shadow-sm backdrop-blur-sm">💰 <span id="stat-gold" class="font-mono">0</span></span>
        <span class="flex items-center gap-1.5 bg-slate-900/50 px-2.5 py-1.5 rounded-xl border border-slate-800 shadow-sm backdrop-blur-sm text-rose-400">⚔️ <span id="stat-mult" class="font-mono">1.0</span></span>
      </div>
      <button id="btn-home" onclick="confirmHome()" class="hide text-slate-400 hover:text-white transition-colors text-xl md:text-2xl" title="Home">🏠</button>
      <button onclick="PackMarketplace.open()" class="text-slate-400 hover:text-white transition-colors text-xl md:text-2xl" title="Grimoire">📜</button>
      <button onclick="PackForge.open()" class="text-slate-400 hover:text-white transition-colors text-xl md:text-2xl" title="Forge">⚒️</button>
      <button onclick="openHelp()" class="text-slate-400 hover:text-white transition-colors text-xl md:text-2xl" title="Help">❓</button>
      <button onclick="openSettings()" class="text-slate-400 hover:text-white transition-colors text-xl md:text-2xl" title="Settings">⚙️</button>
    </div>
  </header>

  <main id="main-container" class="flex-grow flex flex-col items-center relative min-h-0 w-full overflow-hidden">

    <div id="modal-backdrop" class="hide absolute inset-0 bg-slate-950/80 z-[90] backdrop-blur-sm transition-opacity duration-300"></div>

    <!-- Native Vanilla JS Templates -->
    <script src="js/templates/screen-start.js"></script>
    <script src="js/templates/screen-class.js"></script>
    <script src="js/templates/screen-playing.js"></script>
    <script src="js/templates/modal-attack.js"></script>
    <script src="js/templates/modal-dice.js"></script>
    <script src="js/templates/screen-tavern.js"></script>
    <script src="js/templates/screen-end.js"></script>
    <script src="js/templates/modal-settings.js"></script>
    <script src="js/templates/modal-help.js"></script>
    <script src="js/templates/modal-confirm.js"></script>
    <script src="js/templates/modal-leaderboard.js"></script>
    <script src="js/templates/modal-alert.js"></script>
    <script src="js/templates/modal-share.js"></script>
    <script src="js/templates/modal-forge.js"></script>
    <script src="js/templates/modal-marketplace.js"></script>

    <!-- Inject UI Native Components -->
    <script>
      (function() {
        const container = document.getElementById('main-container');
        let fullHtmlStr = '';
        if (window.ViewTemplates) {
          const keys = [
            'screen-start', 'screen-class', 'screen-playing', 'modal-attack',
            'modal-dice', 'screen-tavern', 'screen-end', 'modal-settings',
            'modal-help', 'modal-confirm', 'modal-leaderboard', 'modal-alert',
            'modal-share', 'modal-forge', 'modal-marketplace'
          ];
          keys.forEach(k => { if (window.ViewTemplates[k]) fullHtmlStr += window.ViewTemplates[k]; });
        }
        container.insertAdjacentHTML('beforeend', fullHtmlStr);
      })();
    </script>
  </main>

  <!-- JavaScript: loaded in dependency order natively -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/data.js"></script>
  <script src="js/pack-storage.js"></script>
  <script src="js/pack-engine.js"></script>
  <script src="js/pack-forge.js"></script>
  <script src="js/pack-marketplace.js"></script>
  <script src="js/prng.js"></script>
  <script src="js/sfx.js"></script>
  <script src="js/dice.js"></script>
  <script src="js/image-generator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/leaderboard.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/combat.js"></script>
  <script src="js/spells.js"></script>
  <script src="js/d20.js"></script>
  <script src="js/tavern.js"></script>
  <script src="js/api.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/plugins.js"></script>
  <script src="js/atmosphere.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
